name: Linker
options:
  bundleIdPrefix: dev.linker
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    # Ad-hoc signing ("Sign to Run Locally") so the App Group entitlement is
    # actually applied on the simulator — required for the shared SwiftData store.
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1,2"
targets:
  Linker:
    type: application
    platform: iOS
    sources:
      - path: Linker
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.linker.app
        INFOPLIST_FILE: Linker/Info.plist
        CODE_SIGN_ENTITLEMENTS: Linker/Linker.entitlements
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - target: ShareExtension
        embed: true
  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.linker.app.ShareExtension
        INFOPLIST_FILE: ShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: ShareExtension/ShareExtension.entitlements
        GENERATE_INFOPLIST_FILE: NO
